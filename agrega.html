<!doctype html>
<html lang="es" class="light dark">
  <head>
    <meta charset="UTF-8" />

    <title>Agregar Deportista</title>

    <meta name="description" content="Agregar deportista" />

    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#fffbfe" />

    <link rel="icon" sizes="32x32" href="favicon.ico" />
    <link rel="manifest" href="site.webmanifest" />

    <script type="module" src="js/lib/registraServiceWorker.js"></script>
    <script type="module" src="js/lib/manejaErrores.js"></script>

    <script src="ungap/custom-elements.js"></script>
    <script type="module" src="js/lib/custom/md-app-bar.js"></script>

    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/transicion_pestanas.css" />
    <link rel="stylesheet" href="css/md-filled-text-field.css" />
    <link rel="stylesheet" href="css/material-symbols-outlined.css" />
    <link rel="stylesheet" href="css/md-standard-icon-button.css" />
  </head>

  <body>
    <form id="formulario" novalidate>
      <md-app-bar adicional="tab">
        <a
          class="md-standard-icon-button"
          slot="navigation"
          title="Cancelar"
          href="index.html"
        >
          <span class="material-symbols-outlined">cancel</span>
        </a>

        <h1>Agregar Deportista</h1>

        <button
          type="submit"
          class="md-standard-icon-button"
          title="Guardar"
          slot="action"
        >
          <span class="material-symbols-outlined">save</span>
        </button>
      </md-app-bar>

      <section>
        <!-- NOMBRE -->
        <p>
          <label class="md-filled-text-field">
            <input name="nombre" required placeholder="Nombre*" />

            <span>Nombre *</span>

            <small id="supportingNombre">Obligatorio</small>
          </label>
        </p>

        <!-- DEPORTE -->
        <p>
          <label class="md-filled-text-field">
            <input name="deporte" required placeholder="Deporte*" />

            <span>Deporte *</span>

            <small id="supportingDeporte">Obligatorio</small>
          </label>
        </p>

        <!-- EQUIPO -->
        <p>
          <label class="md-filled-text-field">
            <input name="equipo" required placeholder="Equipo*" />

            <span>Equipo *</span>

            <small id="supportingEquipo">Obligatorio</small>
          </label>
        </p>
      </section>
    </form>

    <script type="module">
      import { muestraTextoDeAyuda } from "./js/lib/muestraTextoDeAyuda.js";
      import { deportistaAgrega } from "./js/deportistaAgrega.js";

      formulario.nombre.addEventListener("input", copiaMensajes);
      formulario.deporte.addEventListener("input", copiaMensajes);
      formulario.equipo.addEventListener("input", copiaMensajes);

      formulario.addEventListener("submit", deportistaAgrega);

      function copiaMensajes() {
        muestraTextoDeAyuda(formulario.nombre, supportingNombre, "Obligatorio");
        muestraTextoDeAyuda(
          formulario.deporte,
          supportingDeporte,
          "Obligatorio",
        );
        muestraTextoDeAyuda(formulario.equipo, supportingEquipo, "Obligatorio");
      }
    </script>
  </body>
</html>
