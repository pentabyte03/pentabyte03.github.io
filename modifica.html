<!doctype html>
<html lang="es" class="light dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />

    <title>Modificar Deportista</title>

    <meta name="description" content="Modificar deportista" />

    <!-- PWA -->
    <script type="module" src="js/lib/registraServiceWorker.js"></script>
    <script type="module" src="js/lib/manejaErrores.js"></script>

    <meta name="theme-color" content="#fffbfe" />
    <link rel="icon" sizes="32x32" href="favicon.ico" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- Polyfill -->
    <script src="ungap/custom-elements.js"></script>

    <!-- Componentes -->
    <script type="module" src="js/lib/custom/md-app-bar.js"></script>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/estilos.css" />
    <link rel="stylesheet" href="css/transicion_pestanas.css" />
    <link rel="stylesheet" href="css/md-filled-text-field.css" />
    <link rel="stylesheet" href="css/material-symbols-outlined.css" />
    <link rel="stylesheet" href="css/md-standard-icon-button.css" />
  </head>

  <body>
    <form id="formulario">
      <md-app-bar adicional="tab">
        <a
          class="md-standard-icon-button"
          slot="navigation"
          title="Cancelar"
          href="index.html"
        >
          <span class="material-symbols-outlined">cancel</span>
        </a>

        <h1>Modificar Deportista</h1>

        <button
          type="submit"
          class="md-standard-icon-button"
          title="Guardar"
          slot="action"
        >
          <span class="material-symbols-outlined">save</span>
        </button>

        <button
          id="botonEliminar"
          type="button"
          class="md-standard-icon-button"
          title="Eliminar"
          slot="action"
        >
          <span class="material-symbols-outlined">delete_forever</span>
        </button>
      </md-app-bar>

      <section>
        <!-- NOMBRE -->
        <p>
          <label class="md-filled-text-field">
            <input name="nombre" required placeholder="Nombre*" />

            <span>Nombre *</span>

            <small id="supportingNombre">Obligatorio</small>
          </label>
        </p>

        <!-- DEPORTE -->
        <p>
          <label class="md-filled-text-field">
            <input name="deporte" required placeholder="Deporte*" />

            <span>Deporte *</span>

            <small id="supportingDeporte">Obligatorio</small>
          </label>
        </p>

        <!-- EQUIPO -->
        <p>
          <label class="md-filled-text-field">
            <input name="equipo" required placeholder="Equipo*" />

            <span>Equipo *</span>

            <small id="supportingEquipo">Obligatorio</small>
          </label>
        </p>
      </section>
    </form>

    <script type="module">
      import { validaEntidadObligatoria } from "./js/lib/validaEntidadObligatoria.js";
      import { muestraObjeto } from "./js/lib/muestraObjeto.js";

      import { deportistaBusca } from "./js/deportistaBusca.js";
      import { deportistaElimina } from "./js/deportistaElimina.js";
      import { deportistaModifica } from "./js/deportistaModifica.js";

      const params = new URL(location.href).searchParams;
      const id = params.get("id");

      descargaDatos();

      async function descargaDatos() {
        if (id !== null && id !== "") {
          let modelo = await deportistaBusca(id);

          modelo = validaEntidadObligatoria("Deportista", modelo);

          muestraObjeto(document, {
            nombre: { value: modelo.DEP_NOMBRE },
            deporte: { value: modelo.DEP_DEPORTE },
            equipo: { value: modelo.DEP_EQUIPO },
          });

          formulario.addEventListener("submit", (event) =>
            deportistaModifica(event, id),
          );

          botonEliminar.addEventListener("click", () => deportistaElimina(id));
        }
      }
    </script>
  </body>
</html>
